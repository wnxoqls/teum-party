<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>틈파티 운영자 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Serif+KR:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff9fb;font-family:'Gmarket Sans',sans-serif;min-height:100vh;padding:1.5rem 1rem 3rem;}
.wrap{max-width:960px;margin:0 auto;}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:2px solid #fce4ec;}
.header h1{font-size:20px;font-weight:700;color:#1a1a1a;}
.header h1 em{font-style:normal;color:#e91e8c;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hbtn{padding:7px 16px;border-radius:999px;border:1.5px solid #e0e0e0;background:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Gmarket Sans',sans-serif;transition:all 0.15s;color:#666;}
.hbtn.pink{border-color:#e91e8c;color:#e91e8c;}
.hbtn.pink:hover{background:#fff0f8;}
.date-add-wrap{display:flex;gap:6px;align-items:center;}
.date-add-input{height:34px;border:1.5px solid #e0e0e0;border-radius:999px;padding:0 12px;font-size:12px;font-family:'Gmarket Sans',sans-serif;outline:none;width:160px;}
.date-add-input:focus{border-color:#e91e8c;}
.date-add-btn{height:34px;padding:0 14px;border-radius:999px;border:none;background:#e91e8c;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Gmarket Sans',sans-serif;white-space:nowrap;}
.tabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:2px solid #fce4ec;}
.tab{padding:10px 24px;font-size:14px;font-weight:500;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s;font-family:'Gmarket Sans',sans-serif;}
.tab:hover{color:#e91e8c;}
.tab.active{color:#e91e8c;font-weight:700;border-bottom:2px solid #e91e8c;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.stat{background:#fff;border-radius:14px;padding:0.75rem 0.5rem;border:1px solid #fce4ec;text-align:center;transition:all 0.2s;}
.stat-label{font-size:11px;color:#999;margin-bottom:4px;}
.stat-num{font-size:22px;font-weight:700;color:#1a1a1a;}
.stat-num.pink{color:#e91e8c;}
.stat-num.green{color:#2e7d32;}
.stat-num.red{color:#c62828;}
.stat-sub-row{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:4px;}
.stat-sub{font-size:12px;color:#888;}
.stat-sub b{font-weight:700;color:#1a1a1a;}
.stat-div{color:#ddd;font-size:12px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.filter-label{font-size:13px;color:#888;}
.pill{font-size:12px;padding:6px 14px;border-radius:999px;border:1.5px solid #e0e0e0;background:#fff;color:#888;cursor:pointer;font-family:'Gmarket Sans',sans-serif;transition:all 0.15s;font-weight:500;}
.pill:hover{border-color:#f48fb1;color:#c2185b;}
.pill.active{background:#e91e8c;border-color:#e91e8c;color:#fff;font-weight:700;}
.search-input{flex:1;min-width:160px;height:36px;font-size:13px;border:1.5px solid #e0e0e0;border-radius:999px;padding:0 14px;background:#fff;color:#1a1a1a;outline:none;font-family:'Gmarket Sans',sans-serif;}
.search-input:focus{border-color:#e91e8c;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.card{background:#fff;border:1px solid #fce4ec;border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.18s;}
.card:hover{border-color:#e91e8c;transform:translateY(-2px);}
.card.approved{border-color:#a5d6a7;background:#f1f8e9;}
.card.rejected{border-color:#ef9a9a;background:#fff5f5;opacity:0.75;}
.card-body{padding:10px 12px 12px;}
.status-badge{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:700;}
.status-badge.검토중{background:#fff3e0;color:#e65100;border:1px solid #ffcc80;}
.status-badge.승인{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
.status-badge.탈락{background:#ffebee;color:#c62828;border:1px solid #ef9a9a;}
.card-name-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.card-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.card-name{font-size:14px;font-weight:700;color:#1a1a1a;}
.badge-new{font-size:10px;padding:2px 6px;border-radius:999px;background:#fff0f8;color:#e91e8c;border:1px solid #f8bbd0;font-weight:700;margin-left:4px;}
.card-sub{font-size:11px;color:#888;margin-bottom:5px;padding-left:40px;}
.card-divider{height:0.5px;background:#f0f0f0;margin:5px 0;}
.card-detail{display:flex;flex-direction:column;gap:2px;margin-bottom:5px;}
.card-row-left{display:flex;align-items:center;gap:5px;font-size:11px;flex-wrap:nowrap;overflow:hidden;}
.cd-key{color:#bbb;min-width:42px;flex-shrink:0;}
.tag{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:500;white-space:nowrap;}
.tag-m{background:#E6F1FB;color:#185FA5;}
.tag-f{background:#fce4ec;color:#993556;}
.tag-mbti{background:#f3f0ff;color:#5b21b6;}
.tag-hashtag{background:#e0f7fa;color:#00695c;}
.loading{text-align:center;padding:3rem;color:#bbb;font-size:14px;grid-column:1/-1;}
.empty{text-align:center;padding:2rem;color:#bbb;font-size:14px;grid-column:1/-1;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:24px;width:400px;max-width:95vw;position:relative;overflow:hidden;margin:auto;}
.modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.12);border:none;color:#333;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
.modal-top{padding:1.5rem 1.5rem 0;}
.modal-avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 12px;}
.modal-name{text-align:center;font-size:19px;font-weight:700;color:#1a1a1a;}
.modal-sub{text-align:center;font-size:13px;color:#888;margin-top:4px;}
.mdivider{height:0.5px;background:#f0f0f0;margin:12px 0;}
.modal-content{padding:0 1.5rem 1.5rem;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-item{background:#fafafa;border-radius:10px;padding:8px 10px;}
.info-key{font-size:11px;color:#999;margin-bottom:2px;}
.info-val{font-size:13px;font-weight:700;color:#1a1a1a;}
.info-full{background:#fafafa;border-radius:10px;padding:8px 10px;margin-top:8px;}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.ptag{font-size:12px;padding:4px 10px;border-radius:999px;background:#fff0f8;color:#993556;border:1px solid #f4c0d1;font-weight:500;}
.insta-link{color:#e91e8c;font-weight:700;text-decoration:none;}
.status-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.btn-approve{height:48px;border-radius:12px;border:none;background:#e91e8c;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Gmarket Sans',sans-serif;}
.btn-approve.active{background:#2e7d32;}
.btn-reject{height:48px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;color:#999;font-size:14px;font-weight:700;cursor:pointer;font-family:'Gmarket Sans',sans-serif;}
.btn-reject.active{background:#c62828;border-color:#c62828;color:#fff;}
.btn-reset{width:100%;height:40px;border-radius:12px;border:1.5px solid #e0e0e0;background:#fff;color:#888;font-size:13px;cursor:pointer;font-family:'Gmarket Sans',sans-serif;margin-top:8px;}
.btn-delete-modal{width:100%;height:40px;border-radius:12px;border:1.5px solid #ef9a9a;background:#fff;color:#c62828;font-size:13px;font-weight:700;cursor:pointer;font-family:'Gmarket Sans',sans-serif;margin-top:8px;}
.btn-delete-modal:hover{background:#ffebee;}
.saving{text-align:center;font-size:12px;color:#e91e8c;margin-top:8px;display:none;}
.saving.show{display:block;}
/* 탭2 */
.card-editor{display:flex;gap:1.5rem;flex-wrap:wrap;}
.card-settings{flex:1;min-width:260px;}
.card-settings h3{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:10px;}
.inp-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.inp-label{font-size:12px;color:#666;font-weight:500;}
.inp-field{height:40px;border:1.5px solid #e0e0e0;border-radius:10px;padding:0 12px;font-size:13px;font-family:'Gmarket Sans',sans-serif;color:#1a1a1a;outline:none;}
.inp-field:focus{border-color:#e91e8c;}
.card-preview-area{flex:1;min-width:300px;display:flex;flex-direction:column;align-items:center;}
.insta-card{width:420px;max-width:100%;background:#0d0d0d;position:relative;overflow:hidden;border:1.5px solid #c9a84c;}
.ic-corner{position:absolute;width:18px;height:18px;}
.ic-corner.tl{top:8px;left:8px;border-top:1.5px solid #c9a84c;border-left:1.5px solid #c9a84c;}
.ic-corner.tr{top:8px;right:8px;border-top:1.5px solid #c9a84c;border-right:1.5px solid #c9a84c;}
.ic-corner.bl{bottom:8px;left:8px;border-bottom:1.5px solid #c9a84c;border-left:1.5px solid #c9a84c;}
.ic-corner.br{bottom:8px;right:8px;border-bottom:1.5px solid #c9a84c;border-right:1.5px solid #c9a84c;}
.ic-inner{padding:20px 26px;}
.ic-brand{font-family:Georgia,serif;font-size:9px;letter-spacing:0.3em;color:#f0d080;text-transform:uppercase;text-align:center;margin-bottom:5px;}
.ic-date{font-family:Georgia,serif;font-size:20px;font-weight:700;color:#fff;text-align:center;line-height:1.3;margin-bottom:2px;}
.ic-divider{display:flex;align-items:center;gap:6px;margin:8px 0;}
.ic-line{flex:1;height:0.5px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);}
.ic-diamond{width:4px;height:4px;background:#c9a84c;transform:rotate(45deg);flex-shrink:0;}
.ic-cols{display:grid;grid-template-columns:1fr 1fr;}
.ic-col{padding:0 8px;}
.ic-col:first-child{border-right:0.5px solid #3a3428;padding-left:0;}
.ic-col:last-child{padding-right:0;}
.ic-col-header{text-align:center;font-size:9px;font-weight:700;letter-spacing:0.25em;color:#f0d080;margin-bottom:6px;padding-bottom:5px;border-bottom:0.5px solid #3a3428;}
.ic-person{text-align:center;font-size:11px;color:#f0ece2;font-weight:400;padding:4px 8px;margin-bottom:4px;border:0.5px solid #3a3428;border-radius:999px;background:rgba(201,168,76,0.08);font-family:'Gmarket Sans',sans-serif;}
.ic-footer{text-align:center;margin-top:6px;font-size:8px;color:#6a6050;letter-spacing:0.2em;text-transform:uppercase;}
.page-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;}
.page-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid #e0e0e0;background:#fff;font-size:16px;cursor:pointer;}
.page-btn:hover{border-color:#e91e8c;color:#e91e8c;}
.page-info{font-size:13px;color:#666;}
.save-btn{width:100%;height:44px;border-radius:10px;border:none;background:#1a1a1a;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Gmarket Sans',sans-serif;margin-top:12px;}
.save-btn:hover{opacity:0.85;}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);}.card-editor{flex-direction:column;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>✨ 틈파티 <em>운영자</em> 대시보드</h1>
    <div class="header-right">
      <button class="hbtn pink" onclick="loadData()">↻ 새로고침</button>
      <div class="date-add-wrap">
        <input class="date-add-input" id="new-date-input" placeholder="2026 6/14 (일)" />
        <button class="date-add-btn" onclick="addPartyDate()">+ 날짜 추가</button>
      </div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(0,this)">📋 신청자 관리</div>
    <div class="tab" onclick="switchTab(1,this)">📣 홍보 명단 카드</div>
    <div class="tab" onclick="switchTab(2,this)">📁 지난 파티</div>
  </div>

  <!-- 탭1: 신청자 관리 -->
  <div class="tab-content active" id="tab0">
    <div class="stats">
      <div class="stat">
        <div class="stat-label" id="stat-title">전체 지원자</div>
        <div class="stat-num pink" id="cnt-total">-</div>
        <div class="stat-sub-row">
          <span class="stat-sub">남 <b id="cnt-m">-</b></span>
          <span class="stat-div">/</span>
          <span class="stat-sub">여 <b id="cnt-f">-</b></span>
        </div>
      </div>
      <div class="stat">
        <div class="stat-label">검토중</div>
        <div class="stat-num" style="color:#e65100;" id="cnt-review">-</div>
      </div>
      <div class="stat">
        <div class="stat-label">승인</div>
        <div class="stat-num green" id="cnt-approved">-</div>
        <div class="stat-sub-row">
          <span class="stat-sub">남 <b id="cnt-approved-m">-</b></span>
          <span class="stat-div">/</span>
          <span class="stat-sub">여 <b id="cnt-approved-f">-</b></span>
        </div>
      </div>
      <div class="stat">
        <div class="stat-label">탈락</div>
        <div class="stat-num red" id="cnt-rejected">-</div>
      </div>
    </div>

    <div class="filters">
      <span class="filter-label">성별</span>
      <button class="pill active" onclick="setFilter('gender','전체',this)">전체</button>
      <button class="pill" onclick="setFilter('gender','남성',this)">남성</button>
      <button class="pill" onclick="setFilter('gender','여성',this)">여성</button>
      <span class="filter-label" style="margin-left:8px;">상태</span>
      <button class="pill active" onclick="setFilter('status','전체',this)">전체</button>
      <button class="pill" onclick="setFilter('status','검토중',this)">검토중</button>
      <button class="pill" onclick="setFilter('status','승인',this)">승인</button>
      <button class="pill" onclick="setFilter('status','탈락',this)">탈락</button>
      <input class="search-input" id="search" placeholder="이름·직업·MBTI 검색..." oninput="renderCards()"/>
    </div>
    <div class="filters" style="margin-top:-4px;">
      <span class="filter-label">파티 날짜</span>
      <div id="date-filter-pills" style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="pill active" onclick="setDateFilter('전체',this)">전체</button>
      </div>
    </div>
    <div class="grid" id="grid"><div class="loading">데이터 불러오는 중... 🩷</div></div>
  </div>

  <!-- 탭2: 홍보 명단 카드 -->
  <div class="tab-content" id="tab1">
    <div class="card-editor">
      <div class="card-settings">
        <h3>⚙️ 카드 설정</h3>
        <div class="inp-row"><span class="inp-label">날짜</span><input class="inp-field" id="card-date" value="2026 6/7 (일)" oninput="renderCard()"/></div>
        <div class="inp-row"><span class="inp-label">브랜드 문구</span><input class="inp-field" id="card-brand" value="TEUM PARTY · 참가자 명단" oninput="renderCard()"/></div>
        <div class="inp-row"><span class="inp-label">인스타 계정</span><input class="inp-field" id="card-insta" value="@teum_party" oninput="renderCard()"/></div>
        <div style="height:0.5px;background:#eee;margin:10px 0;"></div>
        <h3 style="margin-bottom:8px;">👥 참가자 선택</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <div><div style="font-size:11px;font-weight:700;color:#185FA5;margin-bottom:5px;">MAN</div><div id="select-men" style="display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;"></div></div>
          <div><div style="font-size:11px;font-weight:700;color:#993556;margin-bottom:5px;">WOMAN</div><div id="select-women" style="display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;"></div></div>
        </div>
        <div style="font-size:11px;color:#aaa;margin-bottom:10px;" id="select-count">선택: 남 0명 / 여 0명</div>
        <div style="height:0.5px;background:#eee;margin:10px 0;"></div>
        <h3 style="margin-bottom:8px;">✏️ 직접 수정</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <div><div style="font-size:11px;font-weight:700;color:#185FA5;margin-bottom:4px;">MAN</div>
            <textarea id="edit-man" style="width:100%;height:130px;border:1.5px solid #e0e0e0;border-radius:8px;padding:6px 8px;font-size:11px;font-family:inherit;resize:none;line-height:1.8;outline:none;" oninput="renderCard()">1998 / 181 / 수학강사
1995 / 178 / 개발자
1997 / 176 / 마케터
1993 / 180 / 의사
1999 / 174 / 대학원생
1996 / 175 / 공무원
1994 / 177 / 회사원</textarea></div>
          <div><div style="font-size:11px;font-weight:700;color:#993556;margin-bottom:4px;">WOMAN</div>
            <textarea id="edit-woman" style="width:100%;height:130px;border:1.5px solid #e0e0e0;border-radius:8px;padding:6px 8px;font-size:11px;font-family:inherit;resize:none;line-height:1.8;outline:none;" oninput="renderCard()">1999 / 163 / 디자이너
2000 / 165 / 간호사
1998 / 160 / 회계사
1997 / 162 / 교사
2001 / 158 / 대학원생
1996 / 167 / 공무원
1995 / 161 / 마케터</textarea></div>
        </div>
        <div class="page-nav">
          <button class="page-btn" onclick="changePage(-1)">‹</button>
          <span class="page-info" id="page-info">1 / 1 페이지</span>
          <button class="page-btn" onclick="changePage(1)">›</button>
        </div>
        <button class="save-btn" onclick="saveCard()">📸 이미지 저장</button>
      </div>
      <div class="card-preview-area">
        <div class="insta-card" id="insta-card">
          <div class="ic-corner tl"></div><div class="ic-corner tr"></div>
          <div class="ic-corner bl"></div><div class="ic-corner br"></div>
          <div class="ic-inner">
            <div class="ic-brand" id="ic-brand">TEUM PARTY · 참가자 명단</div>
            <div class="ic-date" id="ic-date">2026 6/7 (일)</div>
            <div class="ic-divider"><div class="ic-line"></div><div class="ic-diamond"></div><div class="ic-line"></div></div>
            <div class="ic-cols">
              <div class="ic-col"><div class="ic-col-header">MAN</div><div id="ic-man"></div></div>
              <div class="ic-col"><div class="ic-col-header">WOMAN</div><div id="ic-woman"></div></div>
            </div>
            <div class="ic-divider"><div class="ic-line"></div><div class="ic-diamond"></div><div class="ic-line"></div></div>
            <div class="ic-footer" id="ic-footer">@teum_party</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 탭3: 지난 파티 -->
  <div class="tab-content" id="tab2">
    <div id="past-list"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal-bg').classList.remove('open')">×</button>
    <div id="modal-inner"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwgr8XHuSe6VNwukcasegsOv7sbL6hS2DF7ZaORBt3qf-fcBgFe9yH9ZFHDOZanUFhjSw/exec';
const PER_PAGE=7;
const AC=[{bg:'#E6F1FB',text:'#185FA5'},{bg:'#fce4ec',text:'#993556'},{bg:'#e8f5e9',text:'#2e7d32'},{bg:'#f3e5f5',text:'#6a1b9a'},{bg:'#fff3e0',text:'#e65100'},{bg:'#e0f7fa',text:'#00695c'}];
let allData=[],partyDates=[],filters={gender:'전체',status:'전체',date:'전체'};
let currentModalId=null,selectedMen=[],selectedWomen=[],cardPage=0;

function parseDate(str){const m=String(str).match(/(\d{4})\s+(\d{1,2})\/(\d{1,2})/);if(!m)return null;return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));}

function switchTab(idx,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab'+idx).classList.add('active');
  if(idx===2)renderPastParties();
  if(idx===1)renderCard();
}

function loadData(){
  document.getElementById('grid').innerHTML='<div class="loading">데이터 불러오는 중... 🩷</div>';
  fetch(SCRIPT_URL).then(r=>r.json()).then(res=>{
    allData=Array.isArray(res)?res:(res.data||[]);
    partyDates=Array.isArray(res)?[]:(res.dates||[]);
    updateStats(allData);renderCards();buildSelectLists();renderDatePills();
  }).catch(()=>{document.getElementById('grid').innerHTML='<div class="empty">데이터를 불러오지 못했어요 😢</div>';});
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  return allData.filter(d=>{
    if(filters.gender!=='전체'&&d['성별']!==filters.gender)return false;
    if(filters.status!=='전체'&&(d['상태']||'검토중')!==filters.status)return false;
    if(filters.date!=='전체'&&(d['파티날짜']||'')!==filters.date)return false;
    if(q&&!JSON.stringify(d).toLowerCase().includes(q))return false;
    return true;
  });
}

function updateStats(list){
  const mC=list.filter(d=>d['성별']==='남성').length;
  const fC=list.filter(d=>d['성별']==='여성').length;
  const mA=list.filter(d=>d['성별']==='남성'&&d['상태']==='승인').length;
  const fA=list.filter(d=>d['성별']==='여성'&&d['상태']==='승인').length;
  document.getElementById('cnt-total').textContent=list.length;
  document.getElementById('cnt-m').textContent=mC;
  document.getElementById('cnt-f').textContent=fC;
  document.getElementById('cnt-review').textContent=list.filter(d=>!d['상태']||d['상태']==='검토중').length;
  document.getElementById('cnt-approved').textContent=mA+fA;
  document.getElementById('cnt-approved-m').textContent=mA;
  document.getElementById('cnt-approved-f').textContent=fA;
  document.getElementById('cnt-rejected').textContent=list.filter(d=>d['상태']==='탈락').length;
}

function setFilter(key,val,el){
  filters[key]=val;
  el.closest('.filters').querySelectorAll('[onclick*="\''+key+'\'"]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderCards();updateStats(getFiltered());
}

function setDateFilter(val,el){
  filters.date=val;
  document.querySelectorAll('#date-filter-pills .pill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const label=val==='전체'?'전체 지원자':'📅 '+val;
  document.getElementById('stat-title').textContent=label;
  const list=val==='전체'?allData:allData.filter(d=>d['파티날짜']===val);
  updateStats(list);renderCards();
}

function renderDatePills(){
  const c=document.getElementById('date-filter-pills');
  c.innerHTML='<button class="pill '+(filters.date==='전체'?'active':'')+'" onclick="setDateFilter(\'전체\',this)">전체</button>';
  const today=new Date();today.setHours(0,0,0,0);
  partyDates.filter(d=>{const dt=parseDate(d);return dt&&dt>=today;}).forEach(d=>{
    const b=document.createElement('button');
    b.className='pill'+(filters.date===d?' active':'');
    b.textContent=d;b.onclick=function(){setDateFilter(d,this);};
    c.appendChild(b);
  });
}

function renderCards(){
  const filtered=getFiltered();
  const grid=document.getElementById('grid');
  if(!filtered.length){grid.innerHTML='<div class="empty">해당하는 신청자가 없어요</div>';return;}
  grid.innerHTML='';
  filtered.forEach((d,i)=>{
    const isMale=d['성별']==='남성';
    const status=d['상태']||'검토중';
    const isNew=new Date(d['신청일시']).toLocaleDateString('ko-KR')===new Date().toLocaleDateString('ko-KR');
    const bg=isMale?'#E6F1FB':'#fce4ec';const color=isMale?'#185FA5':'#993556';
    const card=document.createElement('div');
    card.className='card'+(status==='승인'?' approved':status==='탈락'?' rejected':'');
    card.onclick=()=>openModal(d,AC[i%AC.length]);
    card.innerHTML=`<div class="card-body">
      <div class="card-name-row">
        <div class="card-avatar" style="background:${bg};color:${color}">${isMale?'남':'여'}</div>
        <div class="card-name">${d['이름']||'—'}${isNew?'<span class="badge-new">NEW</span>':''}</div>
        <span class="status-badge ${status}" style="margin-left:auto;">${status}</span>
      </div>
      <div class="card-sub">${d['나이']||''} · ${d['키']||''} · ${d['직업']||''}</div>
      <div class="card-divider"></div>
      <div class="card-detail">
        <div class="card-row-left"><span class="cd-key">닮은꼴</span><span class="tag ${isMale?'tag-m':'tag-f'}">${d['닮은꼴']||'—'}</span></div>
        <div class="card-row-left"><span class="cd-key">MBTI</span><span class="tag tag-mbti">${d['MBTI']||'—'}</span></div>
        <div class="card-row-left"><span class="cd-key">태그</span><div style="display:flex;gap:3px;overflow:hidden;">${(d['성격']||'').split(' ').filter(Boolean).map(t=>'<span class="tag tag-hashtag" style="font-size:10px;padding:2px 6px;">'+t+'</span>').join('')||'—'}</div></div>
      </div></div>`;
    grid.appendChild(card);
  });
}

function openModal(d,c){
  currentModalId=d['신청번호'];
  const status=d['상태']||'검토중';
  const tags=(d['성격']||'').split(' ').filter(Boolean);
  const isMale=d['성별']==='남성';
  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-top">
      <div class="modal-avatar" style="background:${isMale?'#E6F1FB':'#fce4ec'};color:${isMale?'#185FA5':'#993556'}">${isMale?'남':'여'}</div>
      <div class="modal-name">${d['이름']||'—'}</div>
      <div class="modal-sub">${d['직업']||''} · ${d['MBTI']||''}</div>
    </div>
    <div class="modal-content">
      <div class="mdivider"></div>
      <div class="info-grid">
        <div class="info-item"><div class="info-key">성별</div><div class="info-val">${d['성별']||'—'}</div></div>
        <div class="info-item"><div class="info-key">나이</div><div class="info-val">${d['나이']||'—'}</div></div>
        <div class="info-item"><div class="info-key">키</div><div class="info-val">${d['키']||'—'}</div></div>
        <div class="info-item"><div class="info-key">닮은꼴</div><div class="info-val">${d['닮은꼴']||'—'}</div></div>
        <div class="info-item"><div class="info-key">연락처</div><div class="info-val">${String(d['연락처']||'—').replace(/^'/,'')}</div></div>
        <div class="info-item"><div class="info-key">인스타</div><div class="info-val">${d['인스타']?'<a class="insta-link" href="https://instagram.com/'+d['인스타'].replace('@','')+'" target="_blank">'+d['인스타']+'</a>':'—'}</div></div>
        <div class="info-item" style="grid-column:1/-1"><div class="info-key">파티 날짜</div><div class="info-val">${d['파티날짜']||'—'}</div></div>
      </div>
      <div class="info-full"><div class="info-key">성격 태그</div><div class="tags-row">${tags.map(t=>'<span class="ptag">'+t+'</span>').join('')||'—'}</div></div>
      <div class="mdivider"></div>
      <div style="font-size:13px;font-weight:700;color:#333;margin-bottom:8px;">승인 여부</div>
      <div class="status-row">
        <button class="btn-approve ${status==='승인'?'active':''}" id="btn-approve" onclick="updateStatus('승인')">✅ 승인</button>
        <button class="btn-reject ${status==='탈락'?'active':''}" id="btn-reject" onclick="updateStatus('탈락')">❌ 탈락</button>
      </div>
      <button class="btn-reset" onclick="updateStatus('검토중')">↩ 검토중으로 되돌리기</button>
      <button class="btn-delete-modal" onclick="deleteOne('${d['신청번호']}')">🗑 이 신청자 삭제</button>
      <div class="saving" id="saving"></div>
    </div>`;
  document.getElementById('modal-bg').classList.add('open');
}

function updateStatus(status){
  if(!currentModalId)return;
  const s=document.getElementById('saving');s.classList.add('show');s.textContent='저장 중...';
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updateStatus',id:currentModalId,status})})
    .then(()=>{
      const idx=allData.findIndex(d=>d['신청번호']===currentModalId);
      if(idx>-1)allData[idx]['상태']=status;
      s.textContent='✅ 저장됨!';
      setTimeout(()=>{s.classList.remove('show');document.getElementById('modal-bg').classList.remove('open');updateStats(getFiltered());renderCards();},800);
    }).catch(()=>{s.textContent='저장 실패 😢';});
}

function deleteOne(id){
  if(!confirm('이 신청자를 삭제할까요? 복구가 불가능해요.'))return;
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'deleteRows',ids:[String(id)]})});
  allData=allData.filter(d=>String(d['신청번호'])!==String(id));
  document.getElementById('modal-bg').classList.remove('open');
  updateStats(getFiltered());renderCards();
}

function closeModal(e){if(e.target===document.getElementById('modal-bg'))document.getElementById('modal-bg').classList.remove('open');}

// 날짜 관리
function addPartyDate(){
  const val=document.getElementById('new-date-input').value.trim();
  if(!val)return;
  if(partyDates.includes(val)){alert('이미 있는 날짜예요');return;}
  partyDates.push(val);
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'updateDates',dates:partyDates})});
  document.getElementById('new-date-input').value='';
  renderDatePills();
}

// 지난 파티
function renderPastParties(){
  const today=new Date();today.setHours(0,0,0,0);
  const past=partyDates.filter(d=>{const dt=parseDate(d);return dt&&dt<today;}).sort((a,b)=>parseDate(b)-parseDate(a));
  const el=document.getElementById('past-list');
  if(!past.length){el.innerHTML='<div style="text-align:center;padding:3rem;color:#bbb;font-size:14px;">아직 지난 파티가 없어요</div>';return;}
  el.innerHTML='';
  past.forEach(date=>{
    const members=allData.filter(d=>d['파티날짜']===date);
    const total=members.length,men=members.filter(d=>d['성별']==='남성').length,women=members.filter(d=>d['성별']==='여성').length;
    const review=members.filter(d=>!d['상태']||d['상태']==='검토중').length;
    const approved=members.filter(d=>d['상태']==='승인').length;
    const rejected=members.filter(d=>d['상태']==='탈락').length;
    const sec=document.createElement('div');
    sec.style.cssText='background:#fff;border:1px solid #fce4ec;border-radius:16px;overflow:hidden;margin-bottom:12px;';
    const hdr=document.createElement('div');
    hdr.style.cssText='padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;';
    hdr.innerHTML=`<div><span style="font-size:15px;font-weight:700;color:#1a1a1a;">📅 ${date}</span><span style="font-size:12px;color:#888;margin-left:10px;">총 ${total}명 (남 ${men} / 여 ${women})</span></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <span style="font-size:11px;padding:3px 10px;border-radius:999px;background:#fff3e0;color:#e65100;border:1px solid #ffcc80;">검토중 ${review}</span>
        <span style="font-size:11px;padding:3px 10px;border-radius:999px;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;">승인 ${approved}</span>
        <span style="font-size:11px;padding:3px 10px;border-radius:999px;background:#ffebee;color:#c62828;border:1px solid #ef9a9a;">탈락 ${rejected}</span>
        <span style="color:#bbb;font-size:13px;" class="arr">▼</span>
      </div>`;
    const body=document.createElement('div');
    body.style.cssText='display:none;padding:14px 18px;border-top:0.5px solid #fce4ec;';
    if(!members.length){body.innerHTML='<div style="font-size:13px;color:#bbb;">해당 날짜 신청자 없음</div>';}
    else{body.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;">'+members.map(d=>{
      const im=d['성별']==='남성';
      const s=d['상태']||'검토중';
      const sc=s==='승인'?'#2e7d32':s==='탈락'?'#c62828':'#e65100';
      const sb=s==='승인'?'#e8f5e9':s==='탈락'?'#ffebee':'#fff3e0';
      return '<div style="background:#fafafa;border-radius:10px;padding:8px 10px;border:1px solid #eee;font-size:12px;">'
        +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">'
        +'<span style="width:24px;height:24px;border-radius:50%;background:'+(im?'#E6F1FB':'#fce4ec')+';color:'+(im?'#185FA5':'#993556')+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;">'+(im?'남':'여')+'</span>'
        +'<span style="font-weight:700;color:#1a1a1a;">'+d['이름']+'</span>'
        +'<span style="margin-left:auto;font-size:10px;padding:1px 7px;border-radius:999px;background:'+sb+';color:'+sc+';">'+s+'</span>'
        +'</div><div style="color:#888;">'+d['나이']+' · '+d['키']+' · '+d['직업']+'</div></div>';
    }).join('')+'</div>';}
    hdr.onclick=()=>{const o=body.style.display!=='none';body.style.display=o?'none':'block';hdr.querySelector('.arr').textContent=o?'▼':'▲';};
    sec.appendChild(hdr);sec.appendChild(body);el.appendChild(sec);
  });
}

// 홍보 카드
function buildSelectLists(){
  const approved=allData.filter(d=>d['상태']==='승인');
  const men=approved.filter(d=>d['성별']==='남성');
  const women=approved.filter(d=>d['성별']==='여성');
  selectedMen=[];selectedWomen=[];
  const mk=(list,el,g)=>{
    el.innerHTML='';
    if(!list.length){el.innerHTML='<div style="font-size:11px;color:#bbb;">승인된 '+g+' 없음</div>';return;}
    list.forEach((d,i)=>{
      const yr=(d['연도']||'?').replace('년생','');
      const ht=(d['키']||'?').replace('cm','')+'cm';
      const row=document.createElement('label');
      row.style.cssText='display:flex;align-items:center;gap:5px;font-size:11px;color:#333;cursor:pointer;padding:3px 6px;border-radius:6px;border:1px solid #eee;background:#fff;';
      const cb=document.createElement('input');cb.type='checkbox';cb.style.accentColor='#e91e8c';cb.dataset.idx=i;cb.dataset.g=g;
      cb.addEventListener('change',()=>{
        selectedMen=[];selectedWomen=[];
        document.querySelectorAll('#select-men input:checked').forEach(c=>selectedMen.push(men[parseInt(c.dataset.idx)]));
        document.querySelectorAll('#select-women input:checked').forEach(c=>selectedWomen.push(women[parseInt(c.dataset.idx)]));
        document.getElementById('select-count').textContent='선택: 남 '+selectedMen.length+'명 / 여 '+selectedWomen.length+'명';
        const fmt=d=>(d['연도']||'?').replace('년생','')+' / '+(d['키']||'?').replace('cm','')+' / '+(d['직업']||'?');
        const pad=arr=>{const l=arr.map(fmt);while(l.length<PER_PAGE)l.push('');return l.slice(0,PER_PAGE).join('\n');};
        document.getElementById('edit-man').value=pad(selectedMen);
        document.getElementById('edit-woman').value=pad(selectedWomen);
        renderCard();
      });
      row.appendChild(cb);row.appendChild(document.createTextNode(yr+' / '+ht+' / '+(d['직업']||'?')));
      el.appendChild(row);
    });
  };
  mk(men,document.getElementById('select-men'),'남');
  mk(women,document.getElementById('select-women'),'여');
}

function changePage(dir){
  const t=Math.max(Math.ceil(selectedMen.length/PER_PAGE),Math.ceil(selectedWomen.length/PER_PAGE),1);
  cardPage=Math.max(0,Math.min(cardPage+dir,t-1));renderCard();
}

function renderCard(){
  const icDate=document.getElementById('ic-date');if(!icDate)return;
  icDate.textContent=document.getElementById('card-date').value;
  document.getElementById('ic-brand').textContent=document.getElementById('card-brand').value;
  document.getElementById('ic-footer').textContent=document.getElementById('card-insta').value;
  const ml=document.getElementById('edit-man').value.split('\n');
  const wl=document.getElementById('edit-woman').value.split('\n');
  const rend=(lines,el)=>{
    let h='';
    for(let i=0;i<PER_PAGE;i++){
      const t=(lines[i]||'').trim();
      h+=t?'<div class="ic-person">'+t+'</div>':'<div class="ic-person" style="opacity:0;">&nbsp;</div>';
    }
    el.innerHTML=h;
  };
  rend(ml,document.getElementById('ic-man'));
  rend(wl,document.getElementById('ic-woman'));
  const t=Math.max(Math.ceil(selectedMen.length/PER_PAGE),Math.ceil(selectedWomen.length/PER_PAGE),1);
  document.getElementById('page-info').textContent=(cardPage+1)+' / '+t+' 페이지';
}

function saveCard(){
  renderCard();
  // 탭1을 잠깐 보이게 했다가 캡처
  const tab1=document.getElementById('tab1');
  const wasHidden=tab1.style.display==='none'||!tab1.classList.contains('active');
  if(wasHidden){
    tab1.style.display='block';
    tab1.style.visibility='hidden';
  }
  const card=document.getElementById('insta-card');
  setTimeout(()=>{
    html2canvas(card,{scale:3,backgroundColor:'#0d0d0d',useCORS:true,logging:false,allowTaint:true})
      .then(c=>{
        if(wasHidden){tab1.style.display='';tab1.style.visibility='';}
        const a=document.createElement('a');
        a.download='틈파티_명단_'+(cardPage+1)+'페이지.png';
        a.href=c.toDataURL('image/png');
        a.click();
      }).catch(err=>{
        if(wasHidden){tab1.style.display='';tab1.style.visibility='';}
        console.error(err);alert('저장 실패 😢 다시 시도해주세요');
      });
  },200);
}

loadData();
renderCard();
</script>
</body>
</html>
